[[collection]]
type = "card"
title = "Habis.in"
link = "https://github.com/Habis-in/habisin-mobile-app"
content = "Habis.in is a digital marketplace concept built during the Refactory × Universitas Amikom Yogyakarta Hackathon. Developed in just 48 hours using the required tech stack (Kotlin and Jetpack Compose), the app tackles food waste by partnering with bakeries and cafés to sell surplus bread nearing its expiration date through a 'surprise box' system—allowing customers to purchase discounted mystery bundles while helping reduce waste."
tags = ["hackathon", "mobile-app", "kotlin", "jetpack-compose", "food-waste"]

